                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#ff6b6b", "id": 2, "label": "Load Balancing", "shape": "dot", "size": 35, "title": "\u003cb\u003eLoad Balancing\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 7/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe process of distributing network traffic across multiple servers to ensure no single server is overloaded, improving responsiveness and availability."}, {"color": "#4a90d9", "id": 1, "label": "Nginx", "shape": "dot", "size": 44, "title": "\u003cb\u003eNginx\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 10/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA powerful open-source web server that can also be used as a reverse proxy, load balancer, mail proxy, and HTTP cache. It\u0027s known for its high performance and low resource consumption."}, {"color": "#ff6b6b", "id": 3, "label": "HTTP Caching", "shape": "dot", "size": 38, "title": "\u003cb\u003eHTTP Caching\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 8/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eStoring copies of frequently accessed web content (like images or pages) closer to the user or on an intermediary server (like Nginx) to reduce server load and speed up subsequent requests."}, {"color": "#ff6b6b", "id": 4, "label": "Reverse Proxy", "shape": "dot", "size": 35, "title": "\u003cb\u003eReverse Proxy\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 7/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA server that sits in front of one or more web servers and forwards client requests to those web servers. It enhances security, performance, and reliability."}, {"color": "#ff6b6b", "id": 5, "label": "Docker", "shape": "dot", "size": 32, "title": "\u003cb\u003eDocker\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 6/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA platform for developing, shipping, and running applications in \u0027containers\u0027, which are lightweight, standalone, executable packages that include everything needed to run a piece of software."}, {"color": "#4a90d9", "id": 6, "label": "Docker Image", "shape": "dot", "size": 29, "title": "\u003cb\u003eDocker Image\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 5/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA read-only template with instructions for creating a Docker container. It includes the application, libraries, dependencies, and configurations required to run it."}, {"color": "#ff6b6b", "id": 7, "label": "Ubuntu", "shape": "dot", "size": 23, "title": "\u003cb\u003eUbuntu\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 3/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA popular open-source Linux operating system, often used for server deployments and development environments."}]);
