        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#ff6b6b", "id": 1, "label": "Real-time Data", "shape": "dot", "size": 38, "title": "\u003cb\u003eReal-time Data\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 8/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eInformation that is delivered immediately as it is collected, reflecting the current state, crucial for applications like trading apps that require up-to-the-minute updates."}, {"color": "#4a90d9", "id": 2, "label": "Trading Applications", "shape": "dot", "size": 32, "title": "\u003cb\u003eTrading Applications\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 6/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eSoftware applications used for buying and selling financial instruments, which heavily rely on up-to-the-minute market data for effective decision-making."}, {"color": "#ff6b6b", "id": 3, "label": "HTTP (Hypertext Transfer Protocol)", "shape": "dot", "size": 41, "title": "\u003cb\u003eHTTP (Hypertext Transfer Protocol)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 9/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA stateless, request-response protocol primarily used for fetching web pages. Each client request generates a server response, but the connection is typically closed afterward. Described as \u0027like email\u0027 due to its turn-based communication."}, {"color": "#4a90d9", "id": 4, "label": "WebSocket Protocol", "shape": "dot", "size": 44, "title": "\u003cb\u003eWebSocket Protocol\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 10/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA full-duplex communication protocol that provides persistent, bi-directional communication channels over a single TCP connection, allowing both client and server to send messages to each other at any time."}, {"color": "#4a90d9", "id": 5, "label": "WebSocket Handshake (HTTP-based)", "shape": "dot", "size": 35, "title": "\u003cb\u003eWebSocket Handshake (HTTP-based)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 7/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe initial process where a client sends a regular HTTP GET request with specific headers to a server to initiate a WebSocket connection. If the server supports WebSockets, it responds with an HTTP status code 101 (Switching Protocols), establishing the persistent WebSocket connection."}, {"color": "#4a90d9", "id": 6, "label": "Full-Duplex Communication", "shape": "dot", "size": 38, "title": "\u003cb\u003eFull-Duplex Communication\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 8/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA communication system where both parties (client and server) can send and receive messages simultaneously and independently, without waiting for the other to finish. This is a key advantage of WebSockets over traditional HTTP."}, {"color": "#4a90d9", "id": 7, "label": "WebSocket Server Implementation", "shape": "dot", "size": 41, "title": "\u003cb\u003eWebSocket Server Implementation\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 9/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe process of writing server-side code (e.g., using Node.js with Express and a WebSocket library) to create a server that listens for and handles WebSocket connections, processes incoming messages, and sends outgoing messages to connected clients."}, {"color": "#4a90d9", "id": 10, "label": "WebSocket Browser API", "shape": "dot", "size": 35, "title": "\u003cb\u003eWebSocket Browser API\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 7/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA client-side JavaScript API available in web browsers that enables web pages to establish and interact with WebSocket servers, allowing them to send and receive messages asynchronously."}, {"color": "#4a90d9", "id": 9, "label": "WebSocket Events (e.g., \u0027connection\u0027, \u0027message\u0027)", "shape": "dot", "size": 35, "title": "\u003cb\u003eWebSocket Events (e.g., \u0027connection\u0027, \u0027message\u0027)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 7/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eWebSocket communication relies on an event-driven model. Common events include \u0027connection\u0027 (when a client connects) and \u0027message\u0027 (when data is received from a connected client or sent to it), which trigger corresponding callback functions."}, {"color": "#ff6b6b", "id": 8, "label": "Network Tab (Browser Developer Tools)", "shape": "dot", "size": 32, "title": "\u003cb\u003eNetwork Tab (Browser Developer Tools)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 6/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA feature in web browser developer tools used by developers to monitor and inspect network activity, including HTTP requests and WebSocket connections, allowing verification of connection status and message flow."}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": 1, "to": 2, "width": 1}, {"arrows": "to", "from": 3, "to": 4, "width": 1}, {"arrows": "to", "from": 3, "to": 5, "width": 1}, {"arrows": "to", "from": 4, "to": 5, "width": 1}, {"arrows": "to", "from": 4, "to": 6, "width": 1}, {"arrows": "to", "from": 4, "to": 7, "width": 1}, {"arrows": "to", "from": 4, "to": 10, "width": 1}, {"arrows": "to", "from": 7, "to": 9, "width": 1}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"layout": {"hierarchical": {"enabled": true, "direction": "UD", "sortMethod": "directed", "nodeSpacing": 250, "levelSeparation": 180, "treeSpacing": 300, "blockShifting": true, "edgeMinimization": true, "parentCentralization": true}}, "physics": {"enabled": true, "solver": "hierarchicalRepulsion", "hierarchicalRepulsion": {"centralGravity": 0.1, "springLength": 300, "springConstant": 0.01, "nodeDistance": 250, "damping": 0.09, "avoidOverlap": 1}, "stabilization": {"enabled": true, "iterations": 1000, "updateInterval": 50, "fit": true}}, "nodes": {"shape": "dot", "borderWidth": 2, "borderWidthSelected": 3, "shadow": {"enabled": true, "color": "rgba(0,0,0,0.15)", "size": 8, "x": 2, "y": 2}, "font": {"size": 15, "face": "Inter,Roboto,sans-serif", "color": "#1e293b", "bold": {"mod": "bold"}}}, "edges": {"color": {"color": "#94a3b8", "highlight": "#3b82f6", "hover": "#3b82f6", "inherit": false}, "width": 1.5, "smooth": {"type": "cubicBezier", "forceDirection": "vertical", "roundness": 0.4}, "arrows": {"to": {"enabled": true, "scaleFactor": 0.7, "type": "arrow"}}, "hoverWidth": 2.5, "selectionWidth": 2.5}, "interaction": {"hover": true, "tooltipDelay": 150, "navigationButtons": true, "keyboard": {"enabled": true}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
