        <script type="text/javascript">

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#ff6b6b", "id": 1, "label": "Software Development Workflow", "shape": "dot", "size": 38, "title": "\u003cb\u003eSoftware Development Workflow\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 8/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe sequential process of developing software, which typically involves writing new code, merging it with the existing codebase, thorough testing, and finally deploying the application to users."}, {"color": "#4a90d9", "id": 4, "label": "Software Testing", "shape": "dot", "size": 26, "title": "\u003cb\u003eSoftware Testing\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 4/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe process of evaluating software to identify bugs, errors, or any deviations from expected behavior, ensuring quality before deployment."}, {"color": "#4a90d9", "id": 5, "label": "Software Deployment", "shape": "dot", "size": 35, "title": "\u003cb\u003eSoftware Deployment\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 7/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe process of making a software application available for use by end-users, involving tasks like releasing, configuring, and enabling the software on servers."}, {"color": "#4a90d9", "id": 6, "label": "CI/CD (Continuous Integration/Continuous Delivery)", "shape": "dot", "size": 41, "title": "\u003cb\u003eCI/CD (Continuous Integration/Continuous Delivery)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 9/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA set of practices in software development that automates the integration, testing, and deployment of code changes, aiming to deliver software reliably and frequently."}, {"color": "#4a90d9", "id": 7, "label": "Manual Software Development Process", "shape": "dot", "size": 32, "title": "\u003cb\u003eManual Software Development Process\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 6/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe traditional method where development, testing, and deployment steps are performed manually, often leading to increased human error, inconsistencies, and slower release cycles."}, {"color": "#4a90d9", "id": 13, "label": "Manual Deployment Approval", "shape": "dot", "size": 32, "title": "\u003cb\u003eManual Deployment Approval\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 6/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA step in the deployment process where human authorization is required before a software change can be released, typically used for critical systems or highly sensitive changes."}, {"color": "#4a90d9", "id": 15, "label": "Canary Deployment / Progressive Delivery", "shape": "dot", "size": 38, "title": "\u003cb\u003eCanary Deployment / Progressive Delivery\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 8/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA deployment strategy that releases a new version of software to a small subset of users first. If the new version performs well without issues, it\u0027s gradually rolled out to more users, minimizing risk."}, {"color": "#4a90d9", "id": 9, "label": "CI/CD Automation Tools", "shape": "dot", "size": 38, "title": "\u003cb\u003eCI/CD Automation Tools\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 8/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eSoftware platforms designed to automate the various stages of a CI/CD pipeline, including building, testing, and deploying applications."}, {"color": "#4a90d9", "id": 14, "label": "Continuous Delivery (CD)", "shape": "dot", "size": 35, "title": "\u003cb\u003eContinuous Delivery (CD)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 7/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA software engineering approach where teams produce software in short cycles, ensuring that the software can be released reliably at any time, though actual deployment to production may still require a manual trigger or approval."}, {"color": "#4a90d9", "id": 10, "label": "Jenkins", "shape": "dot", "size": 41, "title": "\u003cb\u003eJenkins\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 9/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eAn open-source automation server widely used for CI/CD, acting as a jobs orchestrator to automate software building, testing, and deployment. It\u0027s known for its extensibility but can be complex to maintain."}, {"color": "#4a90d9", "id": 11, "label": "GitHub Actions", "shape": "dot", "size": 35, "title": "\u003cb\u003eGitHub Actions\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 7/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA feature from GitHub that allows automation of software workflows, including CI/CD, directly within a GitHub repository, often seen as a modern alternative to Jenkins."}, {"color": "#4a90d9", "id": 12, "label": "Jobs Orchestrator", "shape": "dot", "size": 29, "title": "\u003cb\u003eJobs Orchestrator\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 5/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA system or tool responsible for scheduling, managing, and executing various automated tasks or \u0027jobs\u0027 in a defined sequence, common in CI/CD pipelines."}, {"color": "#ff6b6b", "id": 2, "label": "Scalable Application", "shape": "dot", "size": 29, "title": "\u003cb\u003eScalable Application\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 5/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eAn application designed to handle increasing workloads or user bases over time, necessitating continuous changes, bug fixes, and feature additions rather than a one-time build."}, {"color": "#ff6b6b", "id": 3, "label": "Codebase", "shape": "dot", "size": 23, "title": "\u003cb\u003eCodebase\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 3/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe complete collection of source code files that comprise a particular software application or project."}, {"color": "#ff6b6b", "id": 8, "label": "Errors / Bugs", "shape": "dot", "size": 26, "title": "\u003cb\u003eErrors / Bugs\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 4/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eDefects or flaws in software that cause it to behave unexpectedly or incorrectly, often leading to malfunctions or crashes."}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": 1, "to": 4, "width": 1}, {"arrows": "to", "from": 1, "to": 5, "width": 1}, {"arrows": "to", "from": 1, "to": 6, "width": 1}, {"arrows": "to", "from": 1, "to": 7, "width": 1}, {"arrows": "to", "from": 4, "to": 5, "width": 1}, {"arrows": "to", "from": 5, "to": 6, "width": 1}, {"arrows": "to", "from": 5, "to": 13, "width": 1}, {"arrows": "to", "from": 5, "to": 15, "width": 1}, {"arrows": "to", "from": 6, "to": 9, "width": 1}, {"arrows": "to", "from": 6, "to": 14, "width": 1}, {"arrows": "to", "from": 9, "to": 10, "width": 1}, {"arrows": "to", "from": 9, "to": 11, "width": 1}, {"arrows": "to", "from": 10, "to": 12, "width": 1}]);

                  nodeColors = {};

                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"layout": {"hierarchical": {"enabled": true, "direction": "UD", "sortMethod": "directed", "nodeSpacing": 250, "levelSeparation": 180, "treeSpacing": 300, "blockShifting": true, "edgeMinimization": true, "parentCentralization": true}}, "physics": {"enabled": true, "solver": "hierarchicalRepulsion", "hierarchicalRepulsion": {"centralGravity": 0.1, "springLength": 300, "springConstant": 0.01, "nodeDistance": 250, "damping": 0.09, "avoidOverlap": 1}, "stabilization": {"enabled": true, "iterations": 1000, "updateInterval": 50, "fit": true}}, "nodes": {"shape": "dot", "borderWidth": 2, "borderWidthSelected": 3, "shadow": {"enabled": true, "color": "rgba(0,0,0,0.15)", "size": 8, "x": 2, "y": 2}, "font": {"size": 15, "face": "Inter,Roboto,sans-serif", "color": "#1e293b", "bold": {"mod": "bold"}}}, "edges": {"color": {"color": "#94a3b8", "highlight": "#3b82f6", "hover": "#3b82f6", "inherit": false}, "width": 1.5, "smooth": {"type": "cubicBezier", "forceDirection": "vertical", "roundness": 0.4}, "arrows": {"to": {"enabled": true, "scaleFactor": 0.7, "type": "arrow"}}, "hoverWidth": 2.5, "selectionWidth": 2.5}, "interaction": {"hover": true, "tooltipDelay": 150, "navigationButtons": true, "keyboard": {"enabled": true}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
