                  nodes = new vis.DataSet([{"color": "#ff6b6b", "id": 1, "label": "DevOps", "shape": "dot", "size": 20, "title": "\u003cb\u003eDevOps\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 2/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA set of practices that combines software development (Dev) and IT operations (Ops), of which CI/CD is a core component."}, {"color": "#4a90d9", "id": 2, "label": "Continuous Integration Continuous Delivery (CI/CD)", "shape": "dot", "size": 44, "title": "\u003cb\u003eContinuous Integration Continuous Delivery (CI/CD)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 10/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eAn automated approach to software development that involves continuously integrating code changes, building and testing them, and then preparing them for release or deployment. It is the automation of the software development lifecycle steps."}, {"color": "#4a90d9", "id": 11, "label": "Continuous Integration (CI)", "shape": "dot", "size": 41, "title": "\u003cb\u003eContinuous Integration (CI)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 9/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe practice of automating the build and test stages of the software development lifecycle, triggered by every code change to quickly detect and address integration issues."}, {"color": "#4a90d9", "id": 12, "label": "Continuous Delivery (CD)", "shape": "dot", "size": 41, "title": "\u003cb\u003eContinuous Delivery (CD)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 9/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe practice of automating the release and deployment stages, ensuring the application is always in a deployable state. It typically involves a manual approval step before deployment to production."}, {"color": "#4a90d9", "id": 16, "label": "CI/CD Pipeline", "shape": "dot", "size": 38, "title": "\u003cb\u003eCI/CD Pipeline\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 8/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eAn automated workflow, typically defined by scripts (e.g., YAML files), that orchestrates the stages of CI/CD, from code commit to deployment, ensuring a streamlined and continuous process."}, {"color": "#4a90d9", "id": 19, "label": "Deployment Strategies", "shape": "dot", "size": 41, "title": "\u003cb\u003eDeployment Strategies\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 9/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eMethods used in CI/CD to deploy new versions of applications efficiently, aiming for minimal to zero downtime and providing mechanisms for quick rollback in case of issues."}, {"color": "#4a90d9", "id": 24, "label": "Docker and Kubernetes", "shape": "dot", "size": 23, "title": "\u003cb\u003eDocker and Kubernetes\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 3/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eContainerization (Docker) and container orchestration (Kubernetes) tools that are commonly integrated with CI/CD workflows to enhance portability, scalability, and management of applications, especially in large organizations."}, {"color": "#ff6b6b", "id": 3, "label": "Software Development Lifecycle (SDLC)", "shape": "dot", "size": 35, "title": "\u003cb\u003eSoftware Development Lifecycle (SDLC)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 7/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe entire process that changes in any application go through, from development to deployment, involving steps like coding, building, testing, and releasing."}, {"color": "#4a90d9", "id": 10, "label": "Manual Software Development Process (Pre-CI/CD Problems)", "shape": "dot", "size": 35, "title": "\u003cb\u003eManual Software Development Process (Pre-CI/CD Problems)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 7/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe traditional software development approach where build, test, and deployment steps were performed manually, leading to human errors, time consumption, and inefficiencies."}, {"color": "#ff6b6b", "id": 4, "label": "Feature Development", "shape": "dot", "size": 23, "title": "\u003cb\u003eFeature Development\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 3/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe initial stage of the SDLC where new functionalities or improvements are designed and coded by developers."}, {"color": "#4a90d9", "id": 6, "label": "Build Stage", "shape": "dot", "size": 38, "title": "\u003cb\u003eBuild Stage\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 8/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe process of compiling source code, along with its dependencies and libraries, into deployable artifacts such as binary files, executable files, or packages (e.g., .apk for Android)."}, {"color": "#ff6b6b", "id": 5, "label": "Version Control System (VCS) / Git", "shape": "dot", "size": 38, "title": "\u003cb\u003eVersion Control System (VCS) / Git\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 8/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA system (like Git) used to manage changes to source code over time, allowing multiple developers to work concurrently, manage different code branches, and merge their contributions."}, {"color": "#4a90d9", "id": 14, "label": "Integration Hell", "shape": "dot", "size": 32, "title": "\u003cb\u003eIntegration Hell\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 6/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA problem arising from manual integration processes, where merging code from multiple developers at once leads to frequent conflicts and errors, making the integration process extremely difficult and time-consuming."}, {"color": "#4a90d9", "id": 7, "label": "Software Testing", "shape": "dot", "size": 38, "title": "\u003cb\u003eSoftware Testing\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 8/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eThe process of verifying an application\u0027s functionality and quality, including unit tests (by developers), integration tests (component interaction)  as GitHub Actions and Jenkins."}, {"color": "#ff6b6b", "id": 17, "label": "YAML (Yet Another Markup Language)", "shape": "dot", "size": 29, "title": "\u003cb\u003eYAML (Yet Another Markup Language)\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 5/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA human-friendly data serialization standard, commonly used for configuration files and defining instructions for CI/CD pipelines."}, {"color": "#4a90d9", "id": 20, "label": "Blue-Green Deployment", "shape": "dot", "size": 41, "title": "\u003cb\u003eBlue-Green Deployment\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 9/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA deployment strategy using two identical, separate environments: \u0027Blue\u0027 for the current production version and \u0027Green\u0027 for the new version. All traffic is switched from Blue to Green; if problems arise, traffic can be instantly reverted to Blue."}, {"color": "#4a90d9", "id": 21, "label": "Canary Deployment", "shape": "dot", "size": 41, "title": "\u003cb\u003eCanary Deployment\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 9/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA deployment strategy where a new version is gradually rolled out to a small subset of users first. If stable, more users are progressively directed to the new version, allowing for real-world testing with minimal impact."}, {"color": "#4a90d9", "id": 23, "label": "Rolling Deployment", "shape": "dot", "size": 41, "title": "\u003cb\u003eRolling Deployment\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 9/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA deployment strategy where new versions are deployed incrementally to a subset of instances within an environment. A load balancer directs traffic, allowing for gradual updates and testing without taking the entire application offline."}, {"color": "#ff6b6b", "id": 22, "label": "Load Balancer", "shape": "dot", "size": 32, "title": "\u003cb\u003eLoad Balancer\u003c/b\u003e\u003cbr\u003e\u003ci\u003eImportance: 6/10\u003c/i\u003e\u003cbr\u003e\u003cbr\u003eA component that distributes incoming network traffic across multiple servers or instances, preventing overload on any single server and improving overall application availability and responsiveness."}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": 1, "to": 2, "width": 1}, {"arrows": "to", "from": 2, "to": 11, "width": 1}, {"arrows": "to", "from": 2, "to": 12, "width": 1}, {"arrows": "to", "from": 2, "to": 16, "width": 1}, {"arrows": "to", "from": 2, "to": 19, "width": 1}, {"arrows": "to", "from": 2, "to": 24, "width": 1}, {"arrows": "to", "from": 3, "to": 10, "width": 1}, {"arrows": "to", "from": 4, "to": 6, "width": 1}, {"arrows": "to", "from": 5, "to": 6, "width": 1}, {"arrows": "to", "from": 5, "to": 14, "width": 1}, {"arrows": "to", "from": 6, "to": 7, "width": 1}, {"arrows": "to", "from": 6, "to": 11, "width": 1}, {"arrows": "to", "from": 7, "to": 8, "width": 1}, {"arrows": "to", "from": 7, "to": 11, "width": 1}, {"arrows": "to", "from": 8, "to": 9, "width": 1}, {"arrows": "to", "from": 8, "to": 12, "width": 1}, {"arrows": "to", "from": 8, "to": 15, "width": 1}, {"arrows": "to", "from": 9, "to": 12, "width": 1}, {"arrows": "to", "from": 9, "to": 13, "width": 1}, {"arrows": "to", "from": 9, "to": 15, "width": 1}, {"arrows": "to", "from": 9, "to": 19, "width": 1}, {"arrows": "to", "from": 10, "to": 14, "width": 1}, {"arrows": "to", "from": 10, "to": 15, "width": 1}, {"arrows": "to", "from": 11, "to": 12, "width": 1}, {"arrows": "to", "from": 11, "to": 16, "width": 1}, {"arrows": "to", "from": 12, "to": 13, "width": 1}, {"arrows": "to", "from": 12, "to": 16, "width": 1}, {"arrows": "to", "from": 16, "to": 18, "width": 1}, {"arrows": "to", "from": 17, "to": 16, "width": 1}, {"arrows": "to", "from": 19, "to": 20, "width": 1}, {"arrows": "to", "from": 19, "to": 21, "width": 1}, {"arrows": "to", "from": 19, "to": 23, "width": 1}, {"arrows": "to", "from": 22, "to": 23, "width": 1}]);
